<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7-Segment Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #1e1b4b, #030712);
            --panel-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }
        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            padding: 20px;
        }
        .container {
            width: 90%;
            max-width: 450px;
            padding: 40px 30px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 30px;
            transition: color 0.3s ease;
        }
        .back-btn:hover {
            color: #818cf8;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a5b4fc, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 300;
        }
        .display-box {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
        }
        .number {
            font-size: 5rem;
            font-weight: 800;
            color: #ff3b30;
            text-shadow: 0 0 20px #ff3b30, 0 0 40px rgba(255, 59, 48, 0.4);
            transition: all 0.3s ease;
        }
        .led-status {
            margin-top: 15px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-left: 6px;
            background: #374151;
            color: #f9fafb;
            transition: all 0.3s ease;
        }
        .status-badge.on {
            background: #10b981;
            color: white;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.3);
        }
        .btn {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.5);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #374151;
            box-shadow: none;
        }
        .status-bar {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #9ca3af;
        }
        .status-dot.connected {
            background: #10b981;
        }
        .status-dot.error {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Hub
        </a>
        <h1>7-Segment</h1>
        <p class="subtitle">Triggers a 9 to 0 countdown & lights LED</p>

        <div class="display-box">
            <div id="segmentDisplay" class="number">9</div>
            <div class="led-status">
                LED State: 
                <span id="ledStateBadge" class="status-badge">OFF</span>
            </div>
        </div>

        <div style="display: flex; gap: 16px;">
            <button id="startBtn" class="btn" onclick="startCountdown()" style="flex: 1;">Start Countdown</button>
            <button id="offBtn" class="btn" onclick="stopSegment()" style="flex: 1; background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);">OFF</button>
        </div>

        <div class="status-bar">
            <div id="statusDot" class="status-dot"></div>
            <span id="statusText">System Ready</span>
        </div>
    </div>

    <script>
        const display = document.getElementById('segmentDisplay');
        const ledBadge = document.getElementById('ledStateBadge');
        const startBtn = document.getElementById('startBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let countdownInterval;

        function updateLEDState() {
            fetch('/led/state')
                .then(r => r.text())
                .then(state => {
                    const cleanState = state.trim().toUpperCase();
                    ledBadge.textContent = cleanState;
                    if (cleanState === 'ON') {
                        ledBadge.classList.add('on');
                    } else {
                        ledBadge.classList.remove('on');
                    }
                });
        }

        function stopSegment() {
            clearInterval(countdownInterval);
            display.textContent = '9';
            startBtn.disabled = false;
            statusText.textContent = 'Stopping countdown...';
            statusDot.className = 'status-dot';

            fetch('/segment/off')
                .then(r => {
                    if (r.ok) {
                        statusDot.className = 'status-dot connected';
                        statusText.textContent = 'System Ready (OFF)';
                        updateLEDState();
                    } else {
                        throw new Error();
                    }
                })
                .catch(() => {
                    statusDot.className = 'status-dot error';
                    statusText.textContent = 'Connection Error';
                });
        }

        function startCountdown() {
            startBtn.disabled = true;
            statusText.textContent = 'Starting server countdown...';
            statusDot.className = 'status-dot';

            // Send trigger to server
            fetch('/ldr/start')
                .then(r => {
                    if (!r.ok) throw new Error();
                })
                .catch(() => {
                    statusDot.className = 'status-dot error';
                    statusText.textContent = 'Server response error';
                    startBtn.disabled = false;
                });

            // Start client countdown animation
            let currentVal = 9;
            display.textContent = currentVal;
            statusDot.className = 'status-dot connected';
            statusText.textContent = 'Counting down...';

            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                currentVal--;
                display.textContent = currentVal;
                
                // Fetch state periodically to capture changes
                updateLEDState();

                if (currentVal <= 0) {
                    clearInterval(countdownInterval);
                    statusText.textContent = 'Completed!';
                    startBtn.disabled = false;
                    // Final check to make sure LED state is captured
                    setTimeout(updateLEDState, 500);
                }
            }, 1000);
        }

        // Initial check
        updateLEDState();
    </script>
</body>
</html>
