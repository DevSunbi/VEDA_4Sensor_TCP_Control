<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDR Light Sensor Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #1e1b4b, #030712);
            --panel-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }
        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            padding: 20px;
        }
        .container {
            width: 90%;
            max-width: 450px;
            padding: 40px 30px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 30px;
            transition: color 0.3s ease;
        }
        .back-btn:hover {
            color: #818cf8;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a5b4fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 300;
        }
        
        /* Dial display */
        .sensor-display {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.05);
            margin: 0 auto 30px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5), 0 0 0px rgba(251, 191, 36, 0);
            transition: all 0.5s ease;
        }
        .sensor-display.bright {
            border-color: rgba(251, 191, 36, 0.3);
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5), 0 0 30px rgba(251, 191, 36, 0.3);
        }
        .sensor-value {
            font-size: 3.5rem;
            font-weight: 800;
            color: #f3f4f6;
            line-height: 1;
            transition: color 0.3s ease;
        }
        .sensor-display.bright .sensor-value {
            color: #fbbf24;
        }
        .sensor-unit {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .status-badge.bright {
            background: rgba(251, 191, 36, 0.1);
            border-color: rgba(251, 191, 36, 0.3);
            color: #fbbf24;
        }
        .status-badge.dark {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
            color: #818cf8;
        }

        .status-bar {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #9ca3af;
            transition: background 0.3s ease;
        }
        .status-dot.connected {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        .status-dot.error {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Hub
        </a>
        <h1>LDR Sensor</h1>
        <p class="subtitle">Real-time light intensity monitoring</p>

        <div id="sensorDisplay" class="sensor-display">
            <div id="sensorVal" class="sensor-value">--</div>
            <div class="sensor-unit">ADC Value</div>
        </div>

        <div id="statusBadge" class="status-badge">Detecting...</div>

        <div class="status-bar">
            <div id="statusDot" class="status-dot"></div>
            <span id="statusText">Connecting to sensor...</span>
        </div>
    </div>

    <script>
        const valEl = document.getElementById('sensorVal');
        const displayEl = document.getElementById('sensorDisplay');
        const badgeEl = document.getElementById('statusBadge');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        // Light/Dark threshold (configured to 180 in photoresistor.c)
        const THRESHOLD = 180;

        function fetchPRValue() {
            fetch('/pr')
                .then(r => {
                    if (!r.ok) throw new Error();
                    return r.text();
                })
                .then(valStr => {
                    const val = parseInt(valStr.trim(), 10);
                    if (isNaN(val)) return;

                    valEl.textContent = val;
                    statusDot.className = 'status-dot connected';
                    statusText.textContent = 'Monitoring Live';

                    // Update UI based on threshold (Higher value = darker in photoresistors)
                    // If a2dVal >= 180, it is Dark. If a2dVal < 180, it is Bright.
                    if (val < THRESHOLD) {
                        displayEl.classList.add('bright');
                        badgeEl.textContent = 'STATE: BRIGHT';
                        badgeEl.className = 'status-badge bright';
                    } else {
                        displayEl.classList.remove('bright');
                        badgeEl.textContent = 'STATE: DARK';
                        badgeEl.className = 'status-badge dark';
                    }
                })
                .catch(() => {
                    statusDot.className = 'status-dot error';
                    statusText.textContent = 'Failed to read sensor';
                });
        }

        // Poll every 1 second
        fetchPRValue();
        const pollInterval = setInterval(fetchPRValue, 1000);

        // Clear interval on page navigation
        window.addEventListener('beforeunload', () => {
            clearInterval(pollInterval);
        });
    </script>
</body>
</html>
