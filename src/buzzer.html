<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzzer Octave Keyboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: radial-gradient(circle at center, #1e1b4b, #030712);
            --panel-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }
        body {
            min-height: 100vh;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-primary);
            padding: 20px;
        }
        .container {
            width: 95%;
            max-width: 600px;
            padding: 40px 30px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 30px;
            transition: color 0.3s ease;
        }
        .back-btn:hover {
            color: #818cf8;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a5b4fc, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 40px;
            font-weight: 300;
        }
        
        /* Piano Keyboard */
        .piano {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            gap: 8px;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.4);
        }
        .key {
            flex: 1;
            height: 180px;
            background: linear-gradient(to bottom, #ffffff, #e5e7eb);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 15px;
            color: #1f2937;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.15s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            user-select: none;
        }
        .key:hover {
            background: linear-gradient(to bottom, #f3f4f6, #d1d5db);
            transform: translateY(2px);
        }
        .key:active {
            background: linear-gradient(to bottom, #d1d5db, #9ca3af);
            transform: translateY(4px);
            box-shadow: 0 1px 2px rgba(0,0,0,0.3);
        }

        .btn-off {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        .btn-off:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.5);
        }

        .btn-fein {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }
        .btn-fein:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.5);
        }

        .actions-row {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .status-bar {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #9ca3af;
        }
        .status-dot.connected {
            background: #10b981;
        }
        .status-dot.error {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Hub
        </a>

        <h1>Buzzer Scale</h1>
        <p class="subtitle">Play notes from Do to Do2 via dynamic library</p>

        <div class="piano">
            <div class="key" onclick="playNote('do')">Do</div>
            <div class="key" onclick="playNote('re')">Re</div>
            <div class="key" onclick="playNote('mi')">Mi</div>
            <div class="key" onclick="playNote('fa')">Fa</div>
            <div class="key" onclick="playNote('sol')">Sol</div>
            <div class="key" onclick="playNote('la')">La</div>
            <div class="key" onclick="playNote('si')">Si</div>
            <div class="key" onclick="playNote('do2')">Do2</div>
        </div>

        <div class="actions-row">
            <button class="btn-off" onclick="playNote('off')">STOP SOUND</button>
            <button class="btn-fein" onclick="playNote('fein')">🚨 FEIN ALERT</button>
        </div>

        <div class="status-bar">
            <div id="statusDot" class="status-dot"></div>
            <span id="statusText">System Ready</span>
        </div>
    </div>

    <script>
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        function playNote(note) {
            statusDot.className = 'status-dot';
            statusText.textContent = note === 'off' ? 'Stopping sound...' : `Playing note: ${note.toUpperCase()}...`;

            fetch(`/buzz/${note}`)
                .then(r => {
                    if (r.ok) {
                        statusDot.className = 'status-dot connected';
                        statusText.textContent = note === 'off' ? 'Sound stopped' : `Played ${note.toUpperCase()}`;
                    } else {
                        throw new Error();
                    }
                })
                .catch(() => {
                    statusDot.className = 'status-dot error';
                    statusText.textContent = 'Connection Error';
                });
        }
    </script>
</body>
</html>
